<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sudoku Solver Pro</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <div class="header">
            <h1>🧩 Sudoku Solver Pro</h1>
            <p>Enter a Sudoku puzzle and solve it instantly using the Backtracking Algorithm.</p>
        </div>

        <div id="sudoku-board" class="sudoku-board">
            <!-- Sudoku cells will be generated by JavaScript -->
        </div>

        <div class="button-group">

            <button class="solve-btn" onclick="solveSudokuBoard()">
                🚀 Solve Puzzle
            </button>

            <button class="sample-btn" onclick="loadSamplePuzzle()">
                📋 Load Sample
            </button>

            <button class="clear-btn" onclick="clearBoard()">
                🗑️ Clear Board
            </button>

            <button class="dark-btn" onclick="toggleDarkMode()">
                🌙 Dark Mode
            </button>

        </div>

        <div class="stats">

            <div class="card">
                <h3>Algorithm</h3>
                <p>Backtracking</p>
            </div>

            <div class="card">
                <h3>Grid Size</h3>
                <p>9 × 9</p>
            </div>

            <div class="card">
                <h3>Status</h3>
                <p id="status">Ready</p>
            </div>

        </div>

        <div id="message" class="message"></div>

    </div>

    <footer>
        <p>Developed by Abhishek Badiger Software Development Intern at SkillCraft Technology. • Sudoku Solver Pro</p>
    </footer>

    <script src="script.js"></script>

</body>

</html>
